<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisperChain - Login</title>
  <link rel="stylesheet" href="style.css">  <!-- ADD THIS -->
</head>
<body>
  <div class="container">
    <div class="title-display">
      <h1>WHISPERCHAIN</h1>
    </div>
    
    <div class="login-box">
      <p class="tagline">Get ready!</p>
      
      <input 
        type="text" 
        id="username" 
        class="input-field" 
        placeholder="Enter your username"
        maxlength="20"
      >
      
      <button class="btn btn-primary" onclick="login()">
        LET'S GO!
      </button>
      
      <div id="error-message" class="error hidden">
        Oops! Something went wrong
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>  <!-- ADD THIS -->
</body>
</html>
