<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHISPERCHAIN MAIL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container-wide">
  <div class="title-display">
    <h1>GAMES HISTORY</h1>
  </div>

  <div class="content-box">
    <div id="history-list" class="history-list">
      <!-- Games load here -->
    </div>

    <div id="no-history" class="no-rooms hidden">
      <p>No games played yet!</p>
      <p class="hint">Play a game to see your history</p>
    </div>

    <div class="action-buttons" style="margin-top: 30px;">
      <button class="btn btn-primary" onclick="goToLobby()">BACK TO LOBBY</button>
    </div>
  </div>
</div>

<!-- Scripts at END - NO socket needed for history -->
<script src="app.js"></script>
</body>
</html>
